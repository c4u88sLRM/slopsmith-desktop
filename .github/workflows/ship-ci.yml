name: Ship CI

# PRs into main run the exact same check suite as ci.yml (which gates PRs
# into release/** branches). Reuse it via workflow_call so the two can
# never drift — see ci.yml for the actual steps.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ship-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/ci.yml
