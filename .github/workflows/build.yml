name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      slopsmith_ref:
        description: "Slopsmith core ref (branch or tag) to bundle, e.g. release/v0.3.0. Defaults to main."
        required: false
        default: main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: mac
            arch: universal
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read build configuration
        id: config
        shell: bash
        run: |
          NODE_VERSION=$(node -p "require('./.build-config.json').versions.node")
          PYTHON_VERSION=$(node -p "require('./.build-config.json').versions.python")
          DOTNET_VERSION=$(node -p "require('./.build-config.json').versions.dotnet")
          echo "node=${NODE_VERSION}" >> $GITHUB_OUTPUT
          echo "python=${PYTHON_VERSION}" >> $GITHUB_OUTPUT
          echo "dotnet=${DOTNET_VERSION}" >> $GITHUB_OUTPUT
          echo "Node ${NODE_VERSION}, Python ${PYTHON_VERSION}, .NET ${DOTNET_VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.config.outputs.python }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.config.outputs.dotnet }}

      - name: Setup macOS code signing certificates
        if: matrix.platform == 'mac'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ]; then
            echo "Signing certificate secret is missing. Skipping keychain setup."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Run build system dispatcher
        env:
          SLOPSMITH_REF: ${{ github.event.inputs.slopsmith_ref }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_FOR_PULL_REQUEST: true
        run: ./scripts/build-release.sh

      - name: Zip macOS app for tester distribution (non-tag)
        if: matrix.platform == 'mac' && !startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          app="release/mac/Slopsmith.app"
          if [[ ! -d "$app" ]]; then
            echo "::error::No Slopsmith.app found under release/mac/ — macOS build produced no bundle."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app" "release/Slopsmith-macos-${{ matrix.arch }}.zip"
          echo "Zipped $app -> release/Slopsmith-macos-${{ matrix.arch }}.zip"
          ls -lh "release/Slopsmith-macos-${{ matrix.arch }}.zip"

      - name: Derive Velopack channel
        id: velopack_channel
        if: >-
          (startsWith(github.ref, 'refs/tags/v') && matrix.platform != 'linux')
          || (github.event_name == 'workflow_dispatch' && matrix.platform == 'win')
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            base="$(node -p "require('./package.json').version")"
            base="${base%%-*}"
            channel=dev
            version="${base}-dev.${GITHUB_RUN_NUMBER}"
            echo "Forcing manifest version to manual build signature: ${version}"
            npm version "$version" --allow-same-version --no-git-tag-version
          else
            channel=stable
          fi
          echo "channel=${channel}" >> $GITHUB_OUTPUT

      - name: Package Windows Installer via Velopack
        if: >-
          (startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'win')
          || (github.event_name == 'workflow_dispatch' && matrix.platform == 'win')
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool restore
          echo "Compiling setup release packages via Velopack..."
          dotnet vpk pack \
              --packId "Slopsmith" \
              --packVersion "$(node -p "require('./package.json').version")" \
              --packDir "release/win-unpacked" \
              --mainExe "Slopsmith.exe" \
              --outputDir "release/velopack" \
              --channel "${{ steps.velopack_channel.outputs.channel }}"

      - name: Clean up signing keychain
        if: always() && matrix.platform == 'mac'
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slopsmith-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/*.dmg
            release/velopack/**/*
          if-no-files-found: error
