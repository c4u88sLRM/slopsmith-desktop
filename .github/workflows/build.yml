name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      slopsmith_ref:
        description: "Slopsmith core ref (branch or tag) to bundle, e.g. release/v0.3.0. Defaults to main."
        required: false
        default: main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read build configuration
        id: config
        shell: bash
        run: |
          NODE_VERSION=$(node -p "require('./.build-config.json').versions.node")
          PYTHON_VERSION=$(node -p "require('./.build-config.json').versions.python")
          DOTNET_VERSION=$(node -p "require('./.build-config.json').versions.dotnet")
          echo "node=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "python=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "dotnet=$DOTNET_VERSION" >> $GITHUB_OUTPUT
          echo "Node ${NODE_VERSION}, Python ${PYTHON_VERSION}, .NET ${DOTNET_VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.config.outputs.python }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.config.outputs.dotnet }}

      - name: Install Ninja (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build libasound2-dev libjack-jackd2-dev

      - name: Install Ninja & Tools (macOS)
        if: matrix.platform == 'mac'
        run: brew install ninja dylibbundler ffmpeg fluid-synth speex vgmstream

      - name: Install Ninja & Tools (Windows)
        if: matrix.platform == 'win'
        run: choco install ninja

      - name: Install npm dependencies
        run: npm install

      - name: Bundle application assets
        id: bundle
        shell: bash
        env:
          SLOPSMITH_REF: ${{ github.event.inputs.slopsmith_ref || 'main' }}
        run: |
          echo "Bundling Slopsmith assets with core ref: ${SLOPSMITH_REF}"
          npm run bundle

      - name: Compile typescript
        run: npm run build:ts

      - name: Configure macOS signing certificate
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p build-password build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build-password build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k build-password build.keychain
          rm certificate.p12

      - name: Packaging application
        env:
          APP_BUILD_DATE: ${{ needs.setup.outputs.date }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npm run dist -- --mac --universal
          else
            npm run dist -- --${{ matrix.platform }} --${{ matrix.arch }}
          fi

      - name: Zip macOS app for tester distribution (non-tag)
        if: matrix.platform == 'mac' && !startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          app=$(ls -d release/mac*/Slopsmith.app 2>/dev/null | head -n1 || true)
          if [[ -z "${app:-}" || ! -d "$app" ]]; then
            echo "::error::No Slopsmith.app found under release/mac*/ — macOS build produced no bundle."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app" "release/Slopsmith-macos-universal.zip"
          echo "Zipped $app -> release/Slopsmith-macos-universal.zip"
          ls -lh "release/Slopsmith-macos-universal.zip"

      - name: Derive Velopack channel
        id: velopack_channel
        if: >-
          (startsWith(github.ref, 'refs/tags/v') && matrix.platform != 'linux')
          || (github.event_name == 'workflow_dispatch' && matrix.platform == 'win')
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            base="$(node -p "require('./package.json').version")"
            base="${base%%-*}"
            channel=dev
            version="${base}-dev.${GITHUB_RUN_NUMBER}"
          else
            tag="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag" == *"-alpha"* ]]; then
              channel=alpha
            elif [[ "$tag" == *"-beta"* ]]; then
              channel=beta
            elif [[ "$tag" == *"-rc"* ]]; then
              channel=rc
            else
              channel=stable
            fi
            version="$tag"
          fi
          echo "channel=${channel}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Using Velopack channel: ${channel}, version: ${version}"

      - name: Package Windows installer (Velopack)
        if: >-
          (startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'win')
          || (github.event_name == 'workflow_dispatch' && matrix.platform == 'win')
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool restore
          dotnet vpk pack \
            --packId "Slopsmith" \
            --packVersion "${{ steps.velopack_channel.outputs.version }}" \
            --packDir "release/win-unpacked" \
            --mainExe "Slopsmith.exe" \
            --outputDir "release/velopack" \
            --channel "${{ steps.velopack_channel.outputs.channel }}"

      - name: Clean up signing keychain
        if: always() && matrix.platform == 'mac'
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Upload build artifacts (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: slopsmith-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.zip
          if-no-files-found: error

      - name: Upload release artifacts (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/velopack/*
          if-no-files-found: error
