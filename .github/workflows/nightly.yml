name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      date: ${{ steps.date.outputs.date }}

    steps:
      - name: Find active release branch
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=$(gh api "repos/${{ github.repository }}/git/matching-refs/heads/release/v" \
            --jq '[.[].ref | ltrimstr("refs/heads/")] | sort | last // empty' 2>/dev/null || echo "")
          if [[ -z "$branch" ]]; then
            branch="main"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Active branch: $branch"

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  build-core:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone core at active branch
        run: |
          git clone --depth 1 --branch "${{ needs.setup.outputs.branch }}" \
            https://github.com/${{ github.repository_owner }}/slopsmith.git slopsmith-core

  build:
    needs: [setup, build-core]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          submodules: recursive

      - name: Read build configuration
        id: config
        shell: bash
        run: |
          NODE_VERSION=$(node -p "require('./.build-config.json').versions.node")
          PYTHON_VERSION=$(node -p "require('./.build-config.json').versions.python")
          echo "node=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "python=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "Node ${NODE_VERSION}, Python ${PYTHON_VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.config.outputs.python }}

      - name: Install Ninja (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build libasound2-dev libjack-jackd2-dev

      - name: Install Ninja & Tools (macOS)
        if: matrix.platform == 'mac'
        run: brew install ninja dylibbundler ffmpeg fluid-synth speex vgmstream

      - name: Install Ninja (Windows)
        if: matrix.platform == 'win'
        run: choco install ninja

      - name: Install npm dependencies
        run: npm install

      - name: Bundle application assets
        shell: bash
        run: npm run bundle

      - name: Compile typescript
        run: npm run build:ts

      - name: Packaging application
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npm run dist -- --mac --universal
          else
            npm run dist -- --${{ matrix.platform }} --${{ matrix.arch }}
          fi

      - name: Zip macOS app
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          app=$(ls -d release/mac*/Slopsmith.app 2>/dev/null | head -n1 || true)
          if [[ -z "${app:-}" || ! -d "$app" ]]; then
            echo "::error::No Slopsmith.app found under release/mac*/"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app" "release/Slopsmith-macos-universal.zip"
          echo "Zipped $app -> release/Slopsmith-macos-universal.zip"

      - name: Zip win-unpacked
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          Compress-Archive -Path release\win-unpacked\\* -DestinationPath release\Slopsmith-windows-x64.zip
          Write-Host "Zipped win-unpacked -> release\Slopsmith-windows-x64.zip"

      - name: Clean up signing keychain
        if: always() && matrix.platform == 'mac'
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ needs.setup.outputs.date }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.zip
          if-no-files-found: error
